<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT · MP3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #1e1e2e;
      --accent:    #e8ff47;
      --accent2:   #ff6b35;
      --text:      #f0f0f5;
      --muted:     #6b6b80;
      --radius:    16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* ── background grain ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── glowing orb ── */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,255,71,0.06) 0%, transparent 70%);
      top: -200px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* ── header ── */
    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 300;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    /* ── input group ── */
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    input[type="url"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="url"]::placeholder { color: var(--muted); }

    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.08);
    }

    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      padding: 0.75rem 1.25rem;
      transition: transform 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0f;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.88; }

    .btn-download {
      background: var(--accent2);
      color: #fff;
      width: 100%;
      padding: 0.9rem;
      font-size: 0.95rem;
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-download:hover:not(:disabled) { opacity: 0.88; }

    /* ── preview ── */
    #preview {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: fadeUp 0.3s ease both;
    }

    .preview-inner {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      align-items: center;
    }

    #thumb {
      width: 80px; height: 56px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--border);
    }

    .preview-meta { flex: 1; min-width: 0; }

    #video-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #video-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── progress ── */
    #progress-wrap {
      display: none;
      margin-top: 1rem;
    }

    .progress-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s ease;
      animation: indeterminate 1.4s infinite linear;
    }

    /* ── status ── */
    #status {
      font-size: 0.82rem;
      margin-top: 0.75rem;
      min-height: 1.2em;
      text-align: center;
    }

    .status-error { color: #ff6b6b; }
    .status-ok    { color: var(--accent); }
    .status-info  { color: var(--muted); }

    /* ── footer ── */
    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      animation: fadeUp 0.6s 0.2s ease both;
    }

    footer strong { color: var(--text); }

    /* ── animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); width: 60%; }
      100% { transform: translateX(200%);  width: 60%; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:-0.02em;">YT·MP3</span>
    </div>
    <h1>Descarga audio<br/><span>sin complicaciones</span></h1>
    <p class="subtitle">Pega el link de YouTube y descarga el MP3 al instante</p>
  </header>

  <div class="card">
    <div class="input-group">
      <input type="url" id="url-input" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
      <button class="btn btn-primary" id="btn-info" onclick="fetchInfo()">Buscar</button>
    </div>

    <div id="preview">
      <div class="preview-inner">
        <img id="thumb" src="" alt="thumbnail" />
        <div class="preview-meta">
          <div id="video-title">—</div>
          <div id="video-meta">—</div>
        </div>
      </div>
      <div style="padding: 0 1rem 1rem;">
        <button class="btn btn-download" id="btn-download" onclick="downloadMp3()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Descargar MP3
        </button>
      </div>
    </div>

    <div id="progress-wrap">
      <div class="progress-label">
        <span id="progress-text">Procesando…</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <div id="status"></div>
  </div>

  <footer>
    Jschdeveloper v1.0<strong></strong> · Solo para uso educativo
  </footer>

</div>

<script>
  const urlInput   = document.getElementById('url-input');
  const btnInfo    = document.getElementById('btn-info');
  const btnDl      = document.getElementById('btn-download');
  const preview    = document.getElementById('preview');
  const progressW  = document.getElementById('progress-wrap');
  const statusEl   = document.getElementById('status');

  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') fetchInfo(); });

  function setStatus(msg, type = 'info') {
    statusEl.textContent = msg;
    statusEl.className = `status-${type}`;
  }

  function showProgress(visible) {
    progressW.style.display = visible ? 'block' : 'none';
  }

  async function fetchInfo() {
    const url = urlInput.value.trim();
    if (!url) { setStatus('Ingresa una URL de YouTube.', 'error'); return; }

    preview.style.display = 'none';
    showProgress(false);
    setStatus('Obteniendo información del video…', 'info');
    btnInfo.disabled = true;

    try {
      const res = await fetch('/info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();

      if (!res.ok) { setStatus(data.detail || 'Error al obtener info.', 'error'); return; }

      document.getElementById('thumb').src        = data.thumbnail;
      document.getElementById('video-title').textContent = data.title;
      document.getElementById('video-meta').textContent  = `${data.channel} · ${data.duration}`;
      preview.style.display = 'block';
      setStatus('');
    } catch (e) {
      setStatus('Error de conexión con el servidor.', 'error');
    } finally {
      btnInfo.disabled = false;
    }
  }

  async function downloadMp3() {
    const url = urlInput.value.trim();
    if (!url) return;

    btnDl.disabled = true;
    showProgress(true);
    document.getElementById('progress-text').textContent = 'Descargando y convirtiendo a MP3…';
    setStatus('');

    try {
      const res = await fetch('/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      if (!res.ok) {
        const err = await res.json();
        setStatus(err.detail || 'Error durante la descarga.', 'error');
        return;
      }

      // Extraer nombre del archivo desde el header
      const disposition = res.headers.get('content-disposition') || '';
      const match = disposition.match(/filename\*?=(?:UTF-8'')?["']?([^"';\n]+)/i);
      const filename = match ? decodeURIComponent(match[1]) : 'audio.mp3';

      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);

      setStatus('¡Descarga completada! Revisa tu carpeta de descargas.', 'ok');
    } catch (e) {
      setStatus('Error de conexión. Intenta de nuevo.', 'error');
    } finally {
      btnDl.disabled = false;
      showProgress(false);
    }
  }
</script>
</body>
</html>
